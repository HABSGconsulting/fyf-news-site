baseURL: https://news.fundyourfreedom.in
languageCode: en-in
title: FundYourFreedom News
theme: PaperMod
timeZone: Asia/Kolkata

pagination:
  pagerSize: 20

params:
  mainSections:
    - news
  homeInfoParams:
    Title: "What today's financial news means for your money"
    Content: "Investor-framed analysis of Indian personal finance events, six times a day."
  ShowReadingTime: false
  ShowShareButtons: false
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: false
  hideMeta: false
  dateFormat: "2 Jan 2006"
  defaultTheme: light
  disableThemeToggle: false
  ShowToc: false

menu:
  main:
    - name: Policy Desk
      url: /policy/
      weight: 5
    - name: Blog
      url: https://blog.fundyourfreedom.in
      weight: 10
    - name: Learn
      url: https://learn.fundyourfreedom.in
      weight: 20

languages:
  en:
    languageName: English
    weight: 1
    params:
      mainSections:
        - news
      homeInfoParams:
        Title: "What today's financial news means for your money"
        Content: "Investor-framed analysis of Indian personal finance events, six times a day."
  hi:
    languageName: "हिंदी"
    weight: 2
    contentDir: content
    params:
      mainSections:
        - news
      homeInfoParams:
        Title: "आज की वित्तीय खबरें आपके पैसे के लिए क्या मायने रखती हैं"
        Content: "भारतीय पर्सनल फाइनेंस की निवेशक-केंद्रित विश्लेषण, दिन में छह बार।"

outputs:
  home:
    - HTML
    - RSS
    - JSON

markup:
  goldmark:
    renderer:
      unsafe: true
